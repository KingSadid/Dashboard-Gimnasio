<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Elite Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Dashboard de Alto Rendimiento</h1>
        <div id="dashboard-info" class="dashboard-stats hidden">
            <span>Coach: <strong id="coach-name">...</strong></span>
            <span>Rendimiento Equipo: <strong id="team-score">...</strong></span>
        </div>
    </header>

    <main>
        <div id="status-message" class="loading">Iniciando sistema...</div>
        <div id="athletes-container" class="grid-container"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
