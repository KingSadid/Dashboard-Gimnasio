<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Elite | Performance Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="glass-header">
        <div class="brand">
            <div class="logo-icon">⚡</div>
            <h1>GYM ELITE <span class="badge-pro">PRO</span></h1>
        </div>
        
        <div id="dashboard-stats" class="stats-panel hidden" aria-live="polite">
            <div class="stat-group">
                <span class="label">Coach</span>
                <strong class="value" id="coach-name">--</strong>
            </div>
            <div class="divider"></div>
            <div class="stat-group">
                <span class="label">Team Rating</span>
                <strong class="value accent" id="team-score">--</strong>
            </div>
        </div>
    </header>

    <main>
        <div id="global-loader" class="loader-wrapper" aria-busy="true">
            <div class="spinner"></div>
            <p class="animate-pulse">Sincronizando datos biométricos...</p>
        </div>

        <section id="athletes-grid" class="grid-container"></section>
    </main>

    <script src="app.js"></script>
</body>
</html>
